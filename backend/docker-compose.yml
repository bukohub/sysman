services:
  oracle-xe:
    image: gvenzl/oracle-xe:21-slim
    container_name: sysman-oracle-xe
    environment:
      ORACLE_PASSWORD: ${ORACLE_PASSWORD:-sysman_dev_pwd}
      APP_USER: ${APP_USER:-sysman}
      APP_USER_PASSWORD: ${APP_USER_PASSWORD:-sysman_dev_pwd}
    ports:
      - "1521:1521"
    volumes:
      - oracle-data:/opt/oracle/oradata
    healthcheck:
      test: ["CMD", "healthcheck.sh"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 60s

volumes:
  oracle-data:
