spring:
  application:
    name: sysman
  profiles:
    active: dev
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          batch_size: 50
  flyway:
    locations: classpath:db/migration
    baseline-on-migrate: false
  datasource:
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 5000
      leak-detection-threshold: 30000

server:
  port: 8080

app:
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:}

management:
  endpoints:
    web:
      exposure:
        include: health,info

springdoc:
  swagger-ui:
    path: /swagger-ui.html
